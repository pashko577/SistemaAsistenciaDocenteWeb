<div class="p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Gestión de Docentes</h1>

    <button (click)="toggleModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition-all shadow-md flex items-center whitespace-nowrap">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      Registrar Nuevo Docente
    </button>
  </div>

  <div class="mb-6">
    <div class="relative w-full md:w-64">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
        </svg>
      </div>
      <input type="text"
             (input)="onSearch($event)"
             placeholder="Buscar nombre o DNI..."
             class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

    <div *ngIf="loadingTable()" class="col-span-full p-8 text-center text-gray-500">
      <div class="flex justify-center items-center">
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
        Cargando docentes...
      </div>
    </div>

    <div *ngFor="let doc of filteredDocentes()"
         class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-lg transition-all duration-300 flex flex-col justify-between">

      <div>
        <div class="flex justify-between items-start mb-4">
          <h3 class="text-lg font-bold text-gray-900 truncate">{{ doc.nombres }} {{ doc.apellidos }}</h3>
          <span class="px-3 py-1 rounded-full text-xs font-semibold" [ngClass]="{
                  'bg-green-100 text-green-700': doc.estado === 'ACTIVO',
                  'bg-yellow-100 text-yellow-700': doc.estado === 'NUEVO',
                  'bg-red-100 text-red-700': doc.estado === 'INACTIVO'
                }">
            {{ doc.estado }}
          </span>
        </div>
        <p class="text-sm text-gray-600 mb-1">DNI:</p>
        <p class="text-base font-mono text-gray-800 mb-4">{{ doc.dni }}</p>
      </div>

      <div class="mt-4 pt-4 border-t border-gray-100">
        <a
           class="block text-center w-full bg-gray-900 hover:bg-gray-700 text-white text-sm font-semibold py-2 px-4 rounded-lg transition-colors">
          Ver Perfil
        </a>
      </div>
    </div>

    <div *ngIf="!loadingTable() && filteredDocentes().length === 0"
         class="col-span-full text-center p-10 bg-white rounded-2xl border border-gray-100">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-gray-400 mb-4" fill="none"
           viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
              d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <p class="text-gray-500 font-medium">No se encontraron docentes.</p>
    </div>
  </div>
</div>

<div *ngIf="isModalOpen()"
     class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 backdrop-blur-sm p-4">

  <div class="bg-white w-full max-w-4xl rounded-xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">

    <div class="bg-gray-800 p-4 flex justify-between items-center text-white">
      <h2 class="text-xl font-bold">Formulario de Registro: Docente</h2>
      <button (click)="toggleModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
    </div>

    <form [formGroup]="docenteForm" (ngSubmit)="registerDocente()" class="p-6 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">DNI:</label>
          <input type="text" formControlName="dni" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none" (input)="backendError.set(null)">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Contraseña:</label>
          <input type="password" formControlName="password" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Email:</label>
          <input type="email" formControlName="email" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none" (input)="backendError.set(null)">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Nombres:</label>
          <input type="text" formControlName="nombres" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Apellidos:</label>
          <input type="text" formControlName="apellidos" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Celular:</label>
          <input type="text" formControlName="celular" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col md:col-span-3">
          <label class="text-sm font-semibold text-gray-600">Dirección:</label>
          <input type="text" formControlName="direccion" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Tipo Documento:</label>
          <select formControlName="tipoDocumentoId" class="border rounded-md p-2 bg-white outline-none">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let t of tiposDocumento" [ngValue]="t.id">{{t.nombreTD}}</option>
          </select>
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Sede:</label>
          <select formControlName="sedeId" class="border rounded-md p-2 bg-white outline-none">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let s of sedes" [ngValue]="s.id">{{s.nombreSede}}</option>
          </select>
        </div>
        <div class="flex flex-col">
          <label class="text-sm font-semibold text-gray-600">Especialidad:</label>
          <select formControlName="especialidadId" class="border rounded-md p-2 bg-white outline-none">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let e of especialidades" [ngValue]="e.id">{{e.nombreEspecialidad}}</option>
          </select>
        </div>
        <div class="flex flex-col md:col-span-3">
          <label class="text-sm font-semibold text-gray-600">Observaciones:</label>
          <textarea formControlName="observaciones" rows="2" class="border rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
        </div>
      </div>
      <div *ngIf="successMessage" class="p-3 bg-green-100 text-green-700 rounded-lg text-center font-bold">
        {{ successMessage }}
      </div>
      <div *ngIf="backendError()" class="p-3 bg-red-100 text-red-700 rounded-lg text-center font-bold">
        {{ backendError() }}
      </div>
      <div class="flex justify-end space-x-3 pt-4 border-t">
        <button type="button" (click)="toggleModal()"
                class="px-4 py-2 border rounded-md text-gray-600 hover:bg-gray-100">
          Cancelar
        </button>
        <button type="submit" [disabled]="loading || docenteForm.invalid"
                class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50">
          {{ loading ? 'Enviando...' : 'Registrar Docente' }}
        </button>
      </div>
    </form>
  </div>
</div>
