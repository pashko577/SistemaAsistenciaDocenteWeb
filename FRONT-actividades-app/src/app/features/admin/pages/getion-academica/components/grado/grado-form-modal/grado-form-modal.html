<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-md animate-fadeIn p-4">
    <div
        class="w-full max-w-md bg-white/90 dark:bg-slate-900/90 backdrop-blur-2xl rounded-[2.5rem] shadow-2xl border border-white/20 dark:border-slate-800 overflow-hidden shadow-emerald-900/10 dark:shadow-none">

        <!-- Header -->
        <div class="px-10 py-8 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-white/50 dark:bg-transparent">
            <div>
                <h3 class="text-2xl font-black text-slate-800 dark:text-white tracking-tighter uppercase">
                    {{ grado ? 'Editar' : 'Nuevo' }} <span class="text-baldwin-verde">Grado</span>
                </h3>
                <p class="text-[10px] text-slate-500 uppercase font-black tracking-widest mt-1 opacity-60">
                    Configuración de Grados
                </p>
            </div>
            <button (click)="onClose.emit()"
                class="p-2 rounded-xl text-slate-400 hover:text-rose-500 hover:bg-rose-500/10 transition-all duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="guardar()" class="p-10 space-y-8">
            
            <!-- Selector de Nivel -->
            <div class="space-y-3">
                <label class="text-[11px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">
                    Nivel Institucional
                </label>
                <div class="relative">
                    <select formControlName="nivelId"
                        class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white text-sm font-black focus:ring-4 focus:ring-emerald-500/10 focus:border-baldwin-verde outline-none appearance-none transition-all duration-300">
                        <option value="" disabled>Seleccione un nivel...</option>
                        @for (n of niveles(); track n.id) {
                        <option [value]="n.id">{{ n.nomNivel }}</option>
                        }
                    </select>
                    <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-width="3" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Identificador del Grado -->
            <div class="space-y-3">
                <label class="text-[11px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest ml-1">
                    Identificador del Grado
                </label>
                <input type="text" formControlName="numGrado" placeholder="Ej: 1ero, 2do..."
                    class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-white text-sm font-black focus:ring-4 focus:ring-emerald-500/10 focus:border-baldwin-verde outline-none transition-all duration-300">
            </div>

            <div class="flex gap-4 pt-4">
                <button type="button" (click)="onClose.emit()"
                    class="flex-1 px-6 py-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 text-slate-500 dark:text-slate-400 text-[11px] font-black uppercase tracking-widest hover:bg-slate-50 dark:hover:bg-slate-800 transition-all active:scale-95 duration-300">
                    Cancelar
                </button>
                <button type="submit" [disabled]="form.invalid"
                    class="flex-1 px-6 py-4 rounded-2xl bg-btn-gradient hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed text-white text-[11px] font-black uppercase tracking-widest transition-all shadow-xl shadow-emerald-500/20 active:scale-95 duration-300">
                    {{ grado ? 'Actualizar' : 'Guardar Grado' }}
                </button>
            </div>
        </form>
    </div>
</div>
