<div class="space-y-4 animate-fadeIn">
    <div class="flex justify-between items-center bg-white/40 dark:bg-slate-900/40 backdrop-blur-md p-6 rounded-3xl border border-white/20 dark:border-slate-800/50 shadow-xl shadow-slate-200/50 dark:shadow-none">
        <div>
            <h2 class="text-xl font-black text-slate-800 dark:text-white uppercase tracking-tight">Gestión de <span
                    class="text-baldwin-verde">Grados</span></h2>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider opacity-70">Total registrados: {{ grados().length }}
            </p>
        </div>
        <button (click)="abrirModal()"
            class="flex items-center gap-2 px-6 py-3 bg-btn-gradient hover:opacity-90 text-white text-[11px] font-black rounded-2xl transition-all shadow-lg shadow-baldwin-verde/30 active:scale-95">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-width="3" d="M12 4v16m8-8H4" />
            </svg>
            NUEVO GRADO
        </button>
    </div>

    <div
        class="overflow-hidden rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900/50 shadow-2xl shadow-slate-200/30 dark:shadow-none">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50/80 dark:bg-slate-800/80 border-b border-slate-200 dark:border-slate-800">
                <tr>
                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Grado</th>
                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nivel
                        Institucional</th>
                    <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">
                        Acciones</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                @for (item of grados(); track item.id) {
                <tr class="group hover:bg-slate-50/80 dark:hover:bg-slate-800/40 transition-all duration-300">
                    <td class="px-8 py-5">
                        <span class="text-sm font-black text-slate-700 dark:text-slate-200 uppercase tracking-tight">{{ item.numGrado }}</span>
                    </td>
                    <td class="px-8 py-5">
                        <span
                            class="inline-flex items-center px-3 py-1.5 rounded-xl text-[10px] font-black bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 uppercase tracking-widest ring-1 ring-emerald-400/20">
                            {{ item.nivelNombre }}
                        </span>
                    </td>
                    <td class="px-8 py-5 text-right">
                        <div class="flex justify-end gap-3">
                            <button (click)="abrirModal(item)"
                                class="p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-400 hover:text-baldwin-verde hover:bg-baldwin-verde/10 transition-all duration-300" title="Editar">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-width="2"
                                        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </button>
                            <button (click)="eliminarGrado(item.id)"
                                class="p-2.5 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-400 hover:text-rose-500 hover:bg-rose-500/10 transition-all duration-300" title="Eliminar">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-width="2"
                                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                } @empty {
                <tr>
                    <td colspan="3" class="px-8 py-20 text-center">
                        <div class="flex flex-col items-center gap-3 opacity-30">
                            <p class="text-slate-500 text-sm font-black uppercase tracking-widest italic">No hay registros</p>
                        </div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>

@if (showModal()) {
<app-grado-form-modal [grado]="selectedGrado()" (onClose)="cerrarModal()" (onSave)="cargarGrados()">
</app-grado-form-modal>
}
