<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fadeIn">
    <div
        class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">

        <div
            class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-800/20">
            <div>
                <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight">
                    {{ periodo ? 'Editar' : 'Nuevo' }} <span class="text-baldwin-verde">Periodo</span>
                </h3>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">Configuración del ciclo
                    lectivo</p>
            </div>
            <button (click)="onClose.emit()" class="text-slate-400 hover:text-rose-500 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="guardar()" class="p-8 space-y-6">

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nombre del
                    Periodo</label>
                <input type="text" formControlName="nombre" placeholder="Ej. 2026-I o Año Escolar 2026"
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-sm font-bold dark:text-white outline-none focus:ring-2 focus:ring-baldwin-verde/20 transition-all placeholder:text-slate-400">
                @if (form.get('nombre')?.touched && form.get('nombre')?.invalid) {
                <span class="text-[9px] text-rose-500 font-bold ml-1 uppercase">El nombre es obligatorio</span>
                }
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha de
                        Inicio</label>
                    <input type="date" formControlName="fechaInicio"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-sm font-bold dark:text-white outline-none focus:ring-2 focus:ring-baldwin-verde/20 transition-all appearance-none">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Fecha de
                        Fin</label>
                    <input type="date" formControlName="fechaFin"
                        class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 text-sm font-bold dark:text-white outline-none focus:ring-2 focus:ring-baldwin-verde/20 transition-all appearance-none">
                </div>
            </div>

            @if (form.get('fechaInicio')?.invalid || form.get('fechaFin')?.invalid) {
            <div class="bg-rose-500/10 p-3 rounded-xl border border-rose-500/20 text-center"
                *ngIf="form.get('fechaInicio')?.touched || form.get('fechaFin')?.touched">
                <span class="text-[9px] text-rose-500 font-bold uppercase">Ambas fechas son obligatorias para el
                    registro</span>
            </div>
            }

            <div class="flex gap-3 pt-4">
                <button type="button" (click)="onClose.emit()"
                    class="flex-1 px-6 py-3 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 text-[10px] font-black uppercase tracking-widest rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
                    Cancelar
                </button>
                <button type="submit" [disabled]="form.invalid"
                    class="flex-1 px-6 py-3 bg-baldwin-verde hover:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed text-white text-[10px] font-black uppercase tracking-widest rounded-2xl transition-all shadow-lg shadow-baldwin-verde/20">
                    {{ periodo ? 'Actualizar' : 'Guardar Periodo' }}
                </button>
            </div>
        </form>
    </div>
</div>
