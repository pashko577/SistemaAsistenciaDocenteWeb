<!-- Modal Overlay - Centrado con CSS garantizado (no Tailwind JIT) -->
<div class="modal-overlay animate-fadeIn">

    <!-- Modal Container -->
    <div class="modal-container">

        <!-- Modal Header -->
        <div class="modal-header">
            <div class="flex items-center gap-5">
                <div class="p-4 bg-btn-gradient rounded-2xl text-white shadow-lg shadow-baldwin-verde/20 flex items-center justify-center">
                    <mat-icon class="text-white">person_add</mat-icon>
                </div>
                <div>
                    <h3 class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight">
                        {{ isEdit ? 'Editar' : 'Nueva' }} <span class="text-baldwin-verde">Asignación</span>
                    </h3>
                    <p class="text-[11px] text-slate-400 dark:text-slate-500 font-black uppercase tracking-[0.2em] mt-1">
                        Gestión Escolar • Unidad Académica
                    </p>
                </div>
            </div>
            <button (click)="closeModal()" 
                class="p-3 text-slate-400 hover:text-rose-500 hover:bg-rose-500/10 rounded-2xl transition-all duration-300 active:scale-90 flex items-center justify-center">
                <mat-icon>close</mat-icon>
            </button>
        </div>

        <!-- Scrollable Form Body -->
        <div class="modal-body">
            <form [formGroup]="asignacionForm" (ngSubmit)="save()" class="space-y-8 relative">

                <!-- Loading Overlay -->
                @if (isLoadingData()) {
                <div class="absolute inset-0 z-10 rounded-2xl bg-white/80 dark:bg-slate-900/80 flex flex-col items-center justify-center gap-4">
                    <div class="w-12 h-12 border-4 border-baldwin-verde border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-[11px] font-black uppercase tracking-widest text-slate-500">Sincronizando datos...</p>
                </div>
                }

                <!-- Docente Selection -->
                <div class="space-y-2">
                    <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1">Docente Principal</label>
                    <div class="relative">
                        <select formControlName="docenteId"
                            class="w-full rounded-2xl px-5 py-4 outline-none appearance-none text-sm font-bold cursor-pointer transition-all">
                            <option [ngValue]="null" disabled>Seleccione un docente de la lista</option>
                            @for (d of docentes(); track d.id) {
                                <option [ngValue]="d.id">{{ d.nombres }} {{ d.apellidos }}</option>
                            }
                        </select>
                        <mat-icon class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</mat-icon>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Clase Selection -->
                    <div class="space-y-2">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1">Clase / Curso</label>
                        <div class="relative">
                            <select formControlName="claseId"
                                class="w-full rounded-2xl px-5 py-4 outline-none appearance-none text-sm font-bold cursor-pointer transition-all">
                                <option [ngValue]="null" disabled>Seleccionar clase...</option>
                                @for (c of clases(); track c.id) {
                                    <option [ngValue]="c.id">{{ c.cursoNombre }} - {{ c.nivelNombre }} ({{ c.gradoNombre }} - {{ c.seccionNombre }})</option>
                                }
                            </select>
                            <mat-icon class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">menu_book</mat-icon>
                        </div>
                    </div>

                    <!-- Tipo Actividad -->
                    <div class="space-y-2">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1">Tipo de Actividad</label>
                        <div class="relative">
                            <select formControlName="tipoActividadId"
                                class="w-full rounded-2xl px-5 py-4 outline-none appearance-none text-sm font-bold cursor-pointer transition-all">
                                <option [ngValue]="null" disabled>Definir actividad...</option>
                                @for (t of tiposActividad(); track t.id) {
                                    <option [ngValue]="t.id">{{ t.nombre }}</option>
                                }
                            </select>
                            <mat-icon class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">layers</mat-icon>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Estado -->
                    <div class="space-y-2">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1">Estado</label>
                        <div class="relative">
                            <select formControlName="estado"
                                class="w-full rounded-2xl px-5 py-4 outline-none appearance-none text-[11px] font-black text-baldwin-verde uppercase tracking-widest cursor-pointer transition-all">
                                <option value="ACTIVO">ACTIVO</option>
                                <option value="INACTIVO">INACTIVO</option>
                                <option value="NUEVO">NUEVO</option>
                                <option value="SUSPENDIDO">SUSPENDIDO</option>
                            </select>
                            <mat-icon class="absolute right-5 top-1/2 -translate-y-1/2 text-baldwin-verde pointer-events-none text-base">verified_user</mat-icon>
                        </div>
                    </div>

                    <!-- Observaciones -->
                    <div class="md:col-span-2 space-y-2">
                        <label class="block text-[11px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 ml-1">Observaciones</label>
                        <div class="relative">
                            <input type="text" formControlName="observaciones" placeholder="Ej: Turno Mañana solamente..."
                                class="w-full rounded-2xl px-5 py-4 outline-none text-sm font-bold transition-all placeholder:font-normal">
                            <mat-icon class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 dark:text-slate-600 pointer-events-none">chat_bubble</mat-icon>
                        </div>
                    </div>
                </div>

                <!-- Footer Actions -->
                <div class="flex gap-5 pt-8 border-t border-slate-100 dark:border-slate-800/50">
                    <button type="button" (click)="closeModal()"
                        class="flex-1 px-6 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 text-[11px] font-black uppercase tracking-[0.2em] rounded-2xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-all duration-300">
                        CANCELAR
                    </button>
                    <button type="submit" [disabled]="asignacionForm.invalid || isLoadingData()"
                        class="flex-[1.5] px-6 py-4 bg-btn-gradient disabled:opacity-40 disabled:cursor-not-allowed text-white text-[11px] font-black uppercase tracking-[0.2em] rounded-2xl transition-all shadow-xl shadow-baldwin-cobalto/20 active:scale-[0.98] group">
                        <span class="flex items-center justify-center gap-2">
                            {{ isEdit ? 'Actualizar Registro' : 'Confirmar Registro' }}
                            <mat-icon class="text-sm">chevron_right</mat-icon>
                        </span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
