<button (click)="isMenuOpen = !isMenuOpen"
  class="lg:hidden fixed top-4 left-4 z-50 p-2.5 bg-white dark:bg-slate-900 rounded-xl shadow-md border border-slate-200 dark:border-slate-800 text-slate-600">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path [class.hidden]="isMenuOpen" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    <path [class.hidden]="!isMenuOpen" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
  </svg>
</button>

<aside [ngClass]="isMenuOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 shadow-2xl lg:shadow-none aside-transition lg:translate-x-0 lg:sticky lg:top-0 lg:h-screen flex flex-col font-sans">

  <div class="p-6 flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="w-14 h-14 flex items-center justify-center rounded-2xl bg-white/50 dark:bg-slate-800/50 backdrop-blur-sm border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden p-1.5">
        <img src="/logo.png" 
             alt="Logo Colegio" 
             class="w-full h-full object-contain">
      </div>
      
      <div class="flex flex-col">
        <span class="text-xl font-display font-black text-slate-800 dark:text-white leading-tight tracking-tight">
          Baldwin <span class="text-baldwin-verde">ERP</span>
        </span>
        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[0.15em] mt-0.5">
          Gestión Escolar
        </span>
      </div>
    </div>

    <button (click)="toggleTheme()" 
      class="w-9 h-9 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 shadow-sm border border-slate-100 dark:border-slate-700 transition-all">
      <svg *ngIf="themeService.currentTheme() === 'light'" class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20">
        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" />
      </svg>
      <svg *ngIf="themeService.currentTheme() === 'dark'" class="w-5 h-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
      </svg>
    </button>
  </div>
</div>

  <div class="px-5 mb-4">
    <div class="relative group">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-baldwin-verde transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input type="text" (input)="onSearch($event)" placeholder="Buscar función..." 
        class="w-full bg-slate-50 dark:bg-slate-800/50 text-xs rounded-xl pl-9 pr-4 py-2.5 border border-transparent focus:bg-white focus:border-baldwin-verde/30 focus:ring-4 focus:ring-baldwin-verde/5 outline-none transition-all">
    </div>
  </div>

  <nav class="flex-1 px-3 overflow-y-auto custom-scrollbar">
    <div *ngFor="let section of sections()" class="mb-6">
      <p class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] px-4 mb-3">
        {{ section }}
      </p>

      <div class="space-y-1">
        <a *ngFor="let module of getModulesBySection(section)"
          [routerLink]="module.path"
          routerLinkActive="nav-link-active"
          class="flex items-center gap-3 px-4 py-2 rounded-lg text-slate-500 dark:text-slate-400 hover:text-baldwin-verde hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all group">
          
          <svg class="w-5 h-5 opacity-60 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="module.icon" />
          </svg>

          <span class="text-[13px] font-medium">{{ module.label }}</span>
        </a>
      </div>
    </div>
  </nav>

 <div class="p-4 bg-slate-50/50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800">
  <div class="flex flex-col gap-3 p-3 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
    
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-btn-gradient flex items-center justify-center text-white text-lg font-bold shadow-md shadow-baldwin-verde/20">
        {{ username() ? username()![0].toUpperCase() : 'U' }}
      </div>
      
      <div class="flex-1 min-w-0">
        <p class="text-[12px] font-black text-slate-800 dark:text-white truncate uppercase">
          {{ username() || '12345678' }}
        </p>
        <p class="text-[10px] text-baldwin-verde font-bold">
          ACTIVO • {{ roles()[0] }}
        </p>
      </div>
    </div>

    <button (click)="logout()" 
      class="w-full flex items-center justify-center gap-2 py-2 rounded-lg border border-red-100 dark:border-red-900/30 text-red-600 dark:text-red-400 text-[11px] font-bold hover:bg-red-50 dark:hover:bg-red-500/10 transition-all">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7"/>
      </svg>
      CERRAR SESIÓN
    </button>
  </div>
</div>
</aside>


<div *ngIf="isMenuOpen" (click)="isMenuOpen = false" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 lg:hidden animate-fadeIn"></div>
