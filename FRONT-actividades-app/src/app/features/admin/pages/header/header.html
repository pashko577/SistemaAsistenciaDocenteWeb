<button (click)="isMenuOpen = !isMenuOpen"
  class="lg:hidden fixed top-4 left-4 z-50 p-3 bg-white dark:bg-gray-800 rounded-2xl shadow-lg text-gray-600 dark:text-gray-300 border border-gray-100 dark:border-gray-700">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path [class.hidden]="isMenuOpen" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    <path [class.hidden]="!isMenuOpen" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
  </svg>
</button>

<aside [ngClass]="isMenuOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-40 w-72 bg-white dark:bg-gray-900 border-r border-gray-100 dark:border-gray-800 shadow-xl transform transition-transform duration-300 lg:translate-x-0 lg:sticky lg:top-0 lg:h-screen flex flex-col font-sans">

  <div class="p-6 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-indigo-200 dark:shadow-none shadow-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
        </svg>
      </div>
      <div class="flex flex-col">
        <span class="text-lg font-bold text-gray-800 dark:text-white leading-tight">Baldwin CMS</span>
        <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Sistema Escolar</span>
      </div>
    </div>

    <button (click)="toggleTheme()" class="w-9 h-9 rounded-lg bg-gray-50 dark:bg-gray-800 flex items-center justify-center hover:bg-gray-100 transition-colors border border-gray-100 dark:border-gray-700">
      <svg *ngIf="themeService.currentTheme() === 'light'" class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <svg *ngIf="themeService.currentTheme() === 'dark'" class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
      </svg>
    </button>
  </div>

  <div class="px-5 py-2">
    <div class="relative group">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
      <input type="text" (input)="onSearch($event)" placeholder="Buscar función..." 
        class="w-full bg-gray-50 dark:bg-gray-800/50 text-sm rounded-xl pl-10 pr-4 py-2.5 border border-gray-100 dark:border-gray-700 focus:border-indigo-500 dark:focus:border-indigo-500 outline-none transition-all">
    </div>
  </div>

  <nav class="flex-1 px-3 py-4 overflow-y-auto space-y-1 custom-scrollbar">
    <div *ngIf="filteredModules().length === 0" class="py-10 text-center">
      <p class="text-xs text-gray-400">Sin coincidencias</p>
    </div>

    <div *ngFor="let section of sections()" class="pt-4 first:pt-0">
      <p class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-[0.2em] px-4 mb-2">
        {{ section }}
      </p>

      <a *ngFor="let module of getModulesBySection(section)"
        [routerLink]="module.path"
        routerLinkActive="bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 shadow-sm"
        [routerLinkActiveOptions]="{ exact: module.path === '/dashboard' }"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-all duration-200 group">
        
        <svg class="w-5 h-5 flex-shrink-0 opacity-70 group-hover:opacity-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" [attr.d]="module.icon" />
        </svg>

        <span class="font-medium text-sm">{{ module.label }}</span>

        <span *ngIf="module.badge" class="ml-auto text-[9px] font-bold bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-1.5 py-0.5 rounded-md">
          {{ module.badge }}
        </span>
      </a>
    </div>
  </nav>

  <div class="p-4 mt-auto">
    <div class="bg-gray-50 dark:bg-gray-800/40 rounded-2xl p-3 border border-gray-100 dark:border-gray-700">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-tr from-indigo-600 to-blue-500 flex items-center justify-center text-white font-bold shadow-md">
          {{ username() ? username()![0].toUpperCase() : 'U' }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-bold text-gray-800 dark:text-white truncate uppercase tracking-tight">
            {{ username() || 'Invitado' }}
          </p>
          <p class="text-[10px] text-gray-500 font-medium truncate">
            {{ roles().join(' • ') }}
          </p>
        </div>
      </div>
      
      <button (click)="logout()" class="w-full flex items-center justify-center gap-2 py-2 text-xs font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-all border border-transparent hover:border-red-100 dark:hover:border-red-900/30">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span>Salir del Sistema</span>
      </button>
    </div>
  </div>
</aside>

<div *ngIf="isMenuOpen" (click)="isMenuOpen = false" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-30 lg:hidden"></div>
