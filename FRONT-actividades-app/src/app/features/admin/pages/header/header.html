<button (click)="isMenuOpen = !isMenuOpen"
  class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-white rounded-lg shadow-md text-gray-600 focus:outline-none">
  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path [class.hidden]="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
    <path [class.hidden]="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
  </svg>
</button>

<aside [ngClass]="isMenuOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 text-slate-300 shadow-2xl transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:sticky lg:top-0 lg:h-screen flex flex-col">

  <div class="p-6 border-b border-slate-800 flex items-center gap-3 shrink-0">
    <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center text-white font-bold">A</div>
    <span class="text-xl font-bold text-white tracking-tight">Panel Admin</span>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider px-4 mb-4">Administración</p>

    <a routerLink="/admin/gestionDocente" routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-900/20"
      class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all duration-200 group">
      <svg class="w-5 h-5 transition-colors group-hover:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <span class="font-medium">Gestión Docente</span>
    </a>
  </nav>

  <div class="p-4 border-t border-slate-800 bg-slate-900/50 shrink-0">
    <div class="flex items-center gap-3 px-2 mb-6">
      <div class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-blue-400 font-bold border border-slate-600">
        {{ username ? username.charAt(0).toUpperCase() : 'U' }}
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white truncate">{{ username }}</p>
        <p class="text-xs text-slate-500 truncate italic uppercase">{{ roles.join(', ') }}</p>
      </div>
    </div>

    <button (click)="logout()"
      class="w-full flex items-center justify-center gap-2 px-4 py-3 text-sm font-bold text-red-400 bg-red-400/10 rounded-xl hover:bg-red-400 hover:text-white transition-all duration-300">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Cerrar Sesión
    </button>
  </div>
</aside>

<div *ngIf="isMenuOpen" (click)="isMenuOpen = false"
  class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-30 lg:hidden"></div>
