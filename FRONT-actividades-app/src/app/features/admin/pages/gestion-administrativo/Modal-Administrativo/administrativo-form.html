<!-- modal-administrativo.component.html -->
<div class="card rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
    <!-- Header del Modal -->
    <div class="p-6 bg-gradient-to-r from-blue-600 to-blue-700 flex justify-between items-center">
        <h3 class="text-xl font-bold text-white flex items-center">
            <mat-icon class="mr-2 text-white">badge</mat-icon>
            {{ data.adminSelected ? 'Editar' : 'Registrar' }} Administrativo
        </h3>
        <button (click)="cerrar()" 
                class="text-white/80 hover:text-white transition-colors p-1 rounded-lg hover:bg-white/10">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <!-- Formulario -->
    <form [formGroup]="adminForm" (ngSubmit)="guardar()" 
          class="p-6 max-h-[80vh] overflow-y-auto bg-gradient-to-b from-white to-gray-50 dark:from-gray-900 dark:to-gray-800">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            
            <!-- DNI -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">badge</mat-icon>
                    DNI
                </label>
                <input formControlName="dni" type="text" maxlength="8" placeholder="12345678"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:bg-gray-100 dark:disabled:bg-gray-800 disabled:text-muted text-primary placeholder:text-muted">
                <div *ngIf="adminForm.get('dni')?.touched && adminForm.get('dni')?.invalid" 
                     class="flex items-center gap-1 mt-1.5 text-red-500 dark:text-red-400">
                    <mat-icon class="text-xs" style="font-size: 12px; width: 12px; height: 12px;">error_outline</mat-icon>
                    <span class="text-[10px] font-medium">DNI requerido (8 dígitos)</span>
                </div>
            </div>

            <!-- Contraseña -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">lock</mat-icon>
                    Contraseña
                </label>
                <input formControlName="password" type="password" placeholder="********"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
                <div *ngIf="adminForm.get('password')?.touched && adminForm.get('password')?.invalid" 
                     class="flex items-center gap-1 mt-1.5 text-red-500 dark:text-red-400">
                    <mat-icon class="text-xs" style="font-size: 12px; width: 12px; height: 12px;">error_outline</mat-icon>
                    <span class="text-[10px] font-medium">Contraseña requerida</span>
                </div>
            </div>

            <!-- Nombres -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">person</mat-icon>
                    Nombres
                </label>
                <input formControlName="nombres" type="text" placeholder="Juan Carlos"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
            </div>

            <!-- Apellidos -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">people</mat-icon>
                    Apellidos
                </label>
                <input formControlName="apellidos" type="text" placeholder="Pérez Rodríguez"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
            </div>

            <!-- Sede -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">business</mat-icon>
                        Sede
                    </span>
                    <button type="button" (click)="app('Sede')" 
                            class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center gap-1 normal-case font-medium text-xs">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nueva
                    </button>
                </label>
                <select formControlName="sedeId" 
                        class="w-full px-4 py-3 bg-secondary border border-light rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-primary">
                    <option [ngValue]="null" class="text-muted">Seleccione Sede</option>
                    <option *ngFor="let s of data.sedes" [ngValue]="s.id" class="text-primary">{{ s.nombreSede }}</option>
                </select>
            </div>

            <!-- Cargo -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">work</mat-icon>
                        Cargo
                    </span>
                    <button type="button" (click)="app('Cargo')" 
                            class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center gap-1 normal-case font-medium text-xs">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nuevo
                    </button>
                </label>
                <select formControlName="cargoAdministrativoId" 
                        class="w-full px-4 py-3 bg-secondary border border-light rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-primary">
                    <option [ngValue]="null" class="text-muted">Seleccione Cargo</option>
                    <option *ngFor="let c of data.cargos" [ngValue]="c.id" class="text-primary">{{ c.nombreCargo }}</option>
                </select>
            </div>

            <!-- Celular -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">phone_android</mat-icon>
                    Celular
                </label>
                <input formControlName="celular" type="text" placeholder="987654321"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
            </div>

            <!-- Correo -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">email</mat-icon>
                    Correo
                </label>
                <input formControlName="email" type="email" placeholder="ejemplo@correo.com"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
            </div>

            <!-- Dirección -->
            <div class="flex flex-col md:col-span-2">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">home</mat-icon>
                    Dirección
                </label>
                <input formControlName="direccion" type="text" placeholder="Av. Principal 123"
                    class="w-full px-4 py-3 bg-secondary border border-light rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-primary placeholder:text-muted">
            </div>

            <!-- Tipo Documento -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">description</mat-icon>
                        Tipo Documento
                    </span>
                    <button type="button" (click)="app('Documento')" 
                            class="text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center gap-1 normal-case font-medium text-xs">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nuevo
                    </button>
                </label>
                <select formControlName="tipoDocumentoId" 
                        class="w-full px-4 py-3 bg-secondary border border-light rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-primary">
                    <option *ngFor="let td of data.tiposDoc" [ngValue]="td.id" class="text-primary">{{ td.nombreTD }}</option>
                </select>
            </div>

            <!-- Estado -->
            <div class="flex flex-col">
                <label class="text-xs font-bold text-secondary uppercase mb-1.5 flex items-center">
                    <mat-icon class="mr-1.5 text-blue-600 dark:text-blue-400" style="font-size: 16px; width: 16px; height: 16px;">toggle_on</mat-icon>
                    Estado
                </label>
                <select formControlName="estado" 
                        class="w-full px-4 py-3 bg-secondary border border-light rounded-xl outline-none focus:ring-2 focus:ring-blue-500 text-primary">
                    <option value="ACTIVO" class="text-green-600 dark:text-green-400">✅ ACTIVO</option>
                    <option value="NUEVO" class="text-yellow-600 dark:text-yellow-400">🆕 NUEVO</option>
                    <option value="INACTIVO" class="text-red-600 dark:text-red-400">❌ INACTIVO</option>
                </select>
            </div>
        </div>

        <!-- Botones de acción -->
        <div class="mt-8 flex gap-3">
            <button type="button" (click)="cerrar()" 
                    class="flex-1 px-4 py-3 border-2 border-light text-secondary hover:bg-secondary rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                <mat-icon>cancel</mat-icon> 
                Cancelar
            </button>
            <button type="submit" 
                    [disabled]="adminForm.invalid" 
                    class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white rounded-xl font-bold shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all flex items-center justify-center gap-2">
                <mat-icon>save</mat-icon> 
                {{ data.adminSelected ? 'Actualizar' : 'Guardar' }}
            </button>
        </div>
    </form>
</div>
