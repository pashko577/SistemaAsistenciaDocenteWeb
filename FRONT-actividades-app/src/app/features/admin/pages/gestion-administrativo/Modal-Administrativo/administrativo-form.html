<div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
    <div class="p-6 bg-gradient-to-r from-blue-600 to-blue-700 flex justify-between items-center">
        <h3 class="text-xl font-bold text-white flex items-center">
            <mat-icon class="mr-2 text-white">badge</mat-icon>
            {{ data.adminSelected ? 'Editar' : 'Registrar' }} Administrativo
        </h3>
        <button (click)="cerrar()" class="text-white/80 hover:text-white transition-colors">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <form [formGroup]="adminForm" (ngSubmit)="guardar()" class="p-6 max-h-[80vh] overflow-y-auto bg-gradient-to-b from-white to-gray-50">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            
            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">badge</mat-icon>
                    DNI
                </label>
                <input formControlName="dni" type="text" maxlength="8" placeholder="12345678"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all disabled:bg-gray-100 disabled:text-gray-500">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">lock</mat-icon>
                    Contraseña
                </label>
                <input formControlName="password" type="password" placeholder="********"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">person</mat-icon>
                    Nombres
                </label>
                <input formControlName="nombres" type="text" placeholder="Juan Carlos"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">people</mat-icon>
                    Apellidos
                </label>
                <input formControlName="apellidos" type="text" placeholder="Pérez Rodríguez"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">business</mat-icon>
                        Sede
                    </span>
                    <button type="button" (click)="app('Sede')" 
                            class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1 normal-case font-medium">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nueva
                    </button>
                </label>
                <select formControlName="sedeId" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none bg-white focus:ring-2 focus:ring-blue-500">
                    <option [ngValue]="null">Seleccione Sede</option>
                    <option *ngFor="let s of data.sedes" [ngValue]="s.id">{{ s.nombreSede }}</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">work</mat-icon>
                        Cargo
                    </span>
                    <button type="button" (click)="app('Cargo')" 
                            class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1 normal-case font-medium">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nuevo
                    </button>
                </label>
                <select formControlName="cargoAdministrativoId" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none bg-white focus:ring-2 focus:ring-blue-500">
                    <option [ngValue]="null">Seleccione Cargo</option>
                    <option *ngFor="let c of data.cargos" [ngValue]="c.id">{{ c.nombreCargo }}</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">phone_android</mat-icon>
                    Celular
                </label>
                <input formControlName="celular" type="text" placeholder="987654321"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">email</mat-icon>
                    Correo
                </label>
                <input formControlName="email" type="email" placeholder="ejemplo@correo.com"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col md:col-span-2">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">home</mat-icon>
                    Dirección
                </label>
                <input formControlName="direccion" type="text" placeholder="Av. Principal 123"
                    class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center justify-between">
                    <span class="flex items-center">
                        <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">description</mat-icon>
                        Tipo Documento
                    </span>
                    <button type="button" (click)="app('Documento')" 
                            class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-1 normal-case font-medium">
                        <mat-icon style="font-size: 14px; width: 14px; height: 14px;">add_circle</mat-icon>
                        Nuevo
                    </button>
                </label>
                <select formControlName="tipoDocumentoId" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none bg-white focus:ring-2 focus:ring-blue-500">
                    <option *ngFor="let td of data.tiposDoc" [ngValue]="td.id">{{ td.nombreTD }}</option>
                </select>
            </div>

            <div class="flex flex-col">
                <label class="text-xs font-bold text-gray-600 uppercase mb-1 flex items-center">
                    <mat-icon class="mr-1 text-blue-600" style="font-size: 16px;">toggle_on</mat-icon>
                    Estado
                </label>
                <select formControlName="estado" class="w-full px-4 py-3 border border-gray-200 rounded-xl outline-none bg-white focus:ring-2 focus:ring-blue-500">
                    <option value="ACTIVO">ACTIVO</option>
                    <option value="NUEVO">NUEVO</option>
                    <option value="INACTIVO">INACTIVO</option>
                </select>
            </div>
        </div>

        <div class="mt-8 flex gap-3">
            <button type="button" (click)="cerrar()" class="flex-1 px-4 py-3 border-2 border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 font-bold transition-all flex items-center justify-center gap-2">
                <mat-icon>cancel</mat-icon> Cancelar
            </button>
            <button type="submit" [disabled]="adminForm.invalid" class="flex-1 px-4 py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white rounded-xl hover:from-blue-700 font-bold shadow-lg disabled:opacity-50 transition-all flex items-center justify-center gap-2">
                <mat-icon>save</mat-icon> 
                {{ data.adminSelected ? 'Actualizar' : 'Guardar' }}
            </button>
        </div>
    </form>
</div>
