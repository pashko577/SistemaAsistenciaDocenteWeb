<div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 mb-6 transition-colors duration-300">
    <form [formGroup]="filtroForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Buscador Administrativo</label>
            <div class="relative">
                <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-gray-500" style="font-size: 18px;">search</mat-icon>
                <input formControlName="busqueda" type="text" placeholder="DNI o Nombres..."
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm text-gray-800 dark:text-gray-200 placeholder:text-gray-400 dark:placeholder:text-gray-500">
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Sede</label>
            <select formControlName="sedeId" 
                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm text-gray-800 dark:text-gray-200">
                <option [ngValue]="null">Todas las Sedes</option>
                <option *ngFor="let s of sedes" [ngValue]="s.id">{{ s.nombreSede }}</option>
            </select>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 dark:text-gray-400 uppercase ml-1">Cargo</label>
            <select formControlName="cargoId" 
                class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm text-gray-800 dark:text-gray-200">
                <option [ngValue]="null">Todos</option>
                <option *ngFor="let c of cargos" [ngValue]="c.id">{{ c.nombreCargo }}</option>
            </select>
        </div>

        <div class="flex gap-2">
            <select formControlName="estado" 
                class="flex-1 px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl outline-none text-sm font-medium text-gray-700 dark:text-gray-300">
                <option [ngValue]="null">Cualquier Estado</option>
                <option value="ACTIVO">ACTIVO</option>
                <option value="NUEVO">NUEVO</option>
                <option value="INACTIVO">INACTIVO</option>
            </select>
            <button type="button" (click)="limpiar()" 
                class="p-2 bg-gray-100 dark:bg-gray-700 text-gray-400 dark:text-gray-500 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-500 dark:hover:text-red-400 transition-all border border-transparent hover:border-red-100 dark:hover:border-red-800/50"
                title="Limpiar filtros">
                <mat-icon>filter_list_off</mat-icon>
            </button>
        </div>
    </form>
</div>
