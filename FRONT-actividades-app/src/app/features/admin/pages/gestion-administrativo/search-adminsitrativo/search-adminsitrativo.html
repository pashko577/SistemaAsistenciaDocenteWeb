<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
    <form [formGroup]="filtroForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        
        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Buscador</label>
            <div class="relative">
                <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" style="font-size: 18px;">search</mat-icon>
                <input formControlName="busqueda" type="text" placeholder="DNI o Nombres..."
                    class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Sede</label>
            <select formControlName="sedeId" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm">
                <option [ngValue]="null">Todas</option>
                <option *ngFor="let s of sedes" [ngValue]="s.id">{{ s.nombreSede }}</option>
            </select>
        </div>

        <div class="flex flex-col gap-1">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Cargo</label>
            <select formControlName="cargoId" class="w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm">
                <option [ngValue]="null">Todos</option>
                <option *ngFor="let c of cargos" [ngValue]="c.id">{{ c.nombreCargo }}</option>
            </select>
        </div>

        <div class="flex gap-2">
            <select formControlName="estado" class="flex-1 px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl outline-none text-sm font-medium text-gray-700">
                <option [ngValue]="null">Cualquier Estado</option>
                <option value="ACTIVO">ACTIVO</option>
                <option value="NUEVO">NUEVO</option>
                <option value="INACTIVO">INACTIVO</option>
            </select>
            <button type="button" (click)="limpiar()" 
                class="p-2 bg-gray-100 text-gray-400 rounded-xl hover:bg-red-50 hover:text-red-500 transition-all border border-transparent hover:border-red-100"
                title="Limpiar filtros">
                <mat-icon>filter_list_off</mat-icon>
            </button>
        </div>
    </form>
</div>
