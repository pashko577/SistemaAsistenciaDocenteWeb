<div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-xl">
    <div class="flex items-center gap-3 mb-6">
        <div class="p-2 bg-indigo-500/10 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <div>
            <h2 class="text-xl font-bold text-white">{{ isEdit ? 'Editar' : 'Nuevo' }} Bloque Horario</h2>
            <p class="text-xs text-slate-400">Define los rangos de tiempo por nivel académico.</p>
        </div>
    </div>

    <form [formGroup]="bloqueForm" (ngSubmit)="guardar()" class="space-y-5">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Nivel</label>
                <select formControlName="nivelId" 
                    class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Seleccione Nivel</option>
                    <option *ngFor="let nivel of niveles" [value]="nivel.id">{{ nivel.nomNivel }}</option>
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Hora Inicio</label>
                <input type="time" formControlName="horaInicio" 
                    class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Hora Fin</label>
                <input type="time" formControlName="horaFin"
                    class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Orden</label>
                <input type="number" formControlName="ordenBloque"
                    class="w-full bg-slate-800 border border-slate-700 text-white rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    placeholder="Ej: 1">
            </div>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-800">
            <button type="button" (click)="cancelar.emit()"
                class="px-4 py-2 text-slate-400 hover:text-white transition-colors text-sm font-medium">
                Cancelar
            </button>
            <button type="submit" [disabled]="bloqueForm.invalid"
                class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold py-2 px-6 rounded-lg shadow-lg shadow-indigo-500/20 transition-all active:scale-95 text-sm">
                {{ isEdit ? 'Actualizar' : 'Guardar Bloque' }}
            </button>
        </div>
    </form>
</div>
