<div class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-2xl transition-colors duration-300">
    <div class="flex items-center gap-4 mb-8">
        <div class="p-3 bg-indigo-500/10 rounded-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </div>
        <div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Configurar Horario Maestro</h2>
            <p class="text-slate-500 dark:text-slate-400">Asigne un bloque horario y día a un docente.</p>
        </div>
    </div>

    <form [formGroup]="cronogramaForm" (ngSubmit)="guardar()" class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="space-y-2 md:col-span-2">
            <label class="text-sm font-semibold text-slate-600 dark:text-slate-300 ml-1">Docente / Curso / Sección</label>
            <div class="relative">
                <select formControlName="asignacionDocenteId"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Seleccione la asignación académica</option>
                    <option *ngFor="let asig of asignaciones" [value]="asig.id">
                        {{ asig.docenteNombre }} - {{ asig.cursoNombre }} ({{ asig.nivelNombre }} | {{ asig.gradoNombre }} {{ asig.seccionNombre }})
                    </option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-600 dark:text-slate-300 ml-1">Bloque Horario</label>
            <div class="relative">
                <select formControlName="horarioBloqueId"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Seleccione Bloque</option>
                    <option *ngFor="let b of bloquesFiltrados" [value]="b.id">
                        {{ b.horaInicio }} - {{ b.horaFin }} ({{ b.nivelNombre }})
                    </option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
            <p *ngIf="bloquesFiltrados.length === 0 && cronogramaForm.get('asignacionDocenteId')?.value" class="text-xs text-rose-500 mt-1">
                No hay bloques configurados para este nivel educativo.
            </p>
        </div>

        <div class="space-y-2">
            <label class="text-sm font-semibold text-slate-600 dark:text-slate-300 ml-1">Día de la Semana</label>
            <div class="relative">
                <select formControlName="diaSemana"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Seleccione Día</option>
                    <option *ngFor="let dia of dias" [value]="dia">{{ dia }}</option>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none">
                    <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                            clip-rule="evenodd" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="md:col-span-2 pt-6 flex justify-end">
            <button type="submit" [disabled]="cronogramaForm.invalid"
                class="bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white font-bold py-3 px-10 rounded-xl shadow-xl shadow-indigo-500/20 transition-all hover:-translate-y-0.5 active:scale-95">
                Guardar Horario Maestro
            </button>
        </div>
    </form>
</div>
