<div class="min-h-screen bg-gradient-to-br from-[#F1F5F1] to-[#E8EDE8] dark:from-gray-900 dark:to-gray-800 p-4 sm:p-8 transition-colors duration-300">
  <div class="max-w-7xl mx-auto">
    
    <!-- Header Rediseñado -->
    <div class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-xl rounded-t-3xl shadow-lg border-b border-emerald-100/60 dark:border-gray-700 p-8 transition-all duration-300">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        
        <!-- Logo y Título -->
        <div class="flex items-center gap-5">
          <div class="p-4 bg-gradient-to-br from-emerald-900 to-emerald-800 dark:from-emerald-950 dark:to-emerald-900 rounded-2xl shadow-xl shadow-emerald-200/50 dark:shadow-emerald-950/50 border border-white/5 relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></div>
            <mat-icon class="!text-emerald-50 !w-7 !h-7 !text-[28px] drop-shadow-[0_0_10px_rgba(52,211,153,0.9)] relative z-10">
              assignment_ind
            </mat-icon>
          </div>
          <div>
            <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight uppercase">Módulo de Asistencia</h1>
            <div class="flex items-center gap-2 mt-1">
              <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
              <p class="text-[11px] text-emerald-800/60 dark:text-emerald-400/60 uppercase font-black tracking-[0.2em]">Gestión Institucional v2.0</p>
            </div>
          </div>
        </div>

        <!-- Tabs Rediseñados -->
        <div class="flex bg-emerald-50 dark:bg-gray-900/50 p-1.5 rounded-2xl w-fit border border-emerald-100/50 dark:border-gray-700 shadow-inner">
          <button (click)="tab = 'registro'"
            [ngClass]="tab === 'registro' ? 
              'bg-white dark:bg-gray-800 text-emerald-900 dark:text-emerald-400 shadow-md ring-1 ring-emerald-900/5 dark:ring-emerald-500/20' : 
              'text-emerald-700/60 dark:text-gray-400 hover:text-emerald-900 dark:hover:text-emerald-400'"
            class="px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 uppercase tracking-wider">
            <mat-icon class="!w-4 !h-4 !text-[18px]">edit_calendar</mat-icon> 
            REGISTRO DIARIO
          </button>
          <button (click)="tab = 'horarios'"
            [ngClass]="tab === 'horarios' ? 
              'bg-white dark:bg-gray-800 text-emerald-900 dark:text-emerald-400 shadow-md ring-1 ring-emerald-900/5 dark:ring-emerald-500/20' : 
              'text-emerald-700/60 dark:text-gray-400 hover:text-emerald-900 dark:hover:text-emerald-400'"
            class="px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 uppercase tracking-wider">
            <mat-icon class="!w-4 !h-4 !text-[18px]">more_time</mat-icon> 
            CONFIGURAR HORARIOS
          </button>
        </div>
      </div>
    </div>

    <!-- Contenido Principal -->
    <div class="bg-white dark:bg-gray-800 shadow-2xl rounded-b-3xl overflow-hidden min-h-[600px] border border-emerald-100/50 dark:border-gray-700 border-t-0 transition-all duration-300">
      <div *ngIf="tab === 'registro'" class="animate-in fade-in zoom-in-95 duration-500">
        <app-asistencia-registro></app-asistencia-registro>
      </div>
      <div *ngIf="tab === 'horarios'" class="animate-in slide-in-from-bottom-4 duration-500">
        <app-cronograma-list></app-cronograma-list>
      </div>
    </div>
  </div>
</div>
