<div class="min-h-screen bg-[#F1F5F1] p-4 sm:p-8">
  <div class="max-w-7xl mx-auto">
    
    <div class="bg-white/80 backdrop-blur-xl rounded-t-3xl shadow-[0_1px_3px_rgba(0,0,0,0.05)] border-b border-emerald-100/60 p-8">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        
        <div class="flex items-center gap-5">
          <div class="p-4 bg-emerald-950 rounded-2xl shadow-xl shadow-emerald-200/50 border border-white/5">
            <mat-icon class="!text-emerald-50 !w-7 !h-7 !text-[28px] drop-shadow-[0_0_10px_rgba(52,211,153,0.9)]">
              assignment_ind
            </mat-icon>
          </div>
          <div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Módulo de Asistencia</h1>
            <div class="flex items-center gap-2 mt-1">
              <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
              <p class="text-[11px] text-emerald-800/60 uppercase font-black tracking-[0.2em]">Gestión Institucional v2.0</p>
            </div>
          </div>
        </div>

        <div class="flex bg-emerald-50 p-1.5 rounded-2xl w-fit border border-emerald-100/50">
          <button (click)="tab = 'registro'"
            [ngClass]="tab === 'registro' ? 'bg-white text-emerald-900 shadow-md ring-1 ring-emerald-900/5' : 'text-emerald-700/60 hover:text-emerald-900'"
            class="px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 uppercase tracking-wider">
            <mat-icon class="!w-4 !h-4 !text-[18px]">edit_calendar</mat-icon> 
            REGISTRO DIARIO
          </button>
          <button (click)="tab = 'horarios'"
            [ngClass]="tab === 'horarios' ? 'bg-white text-emerald-900 shadow-md ring-1 ring-emerald-900/5' : 'text-emerald-700/60 hover:text-emerald-900'"
            class="px-8 py-3 rounded-xl text-xs font-black transition-all flex items-center gap-2 uppercase tracking-wider">
            <mat-icon class="!w-4 !h-4 !text-[18px]">more_time</mat-icon> 
            CONFIGURAR HORARIOS
          </button>
        </div>
      </div>
    </div>

    <div class="bg-white shadow-[0_30px_60px_rgba(0,0,0,0.03)] rounded-b-3xl overflow-hidden min-h-[600px] border border-emerald-100/50 border-t-0">
      <div *ngIf="tab === 'registro'" class="animate-in fade-in zoom-in-95 duration-500">
        <app-asistencia-registro></app-asistencia-registro>
      </div>
      <div *ngIf="tab === 'horarios'" class="animate-in slide-in-from-bottom-4 duration-500">
        <app-cronograma-list></app-cronograma-list>
      </div>
    </div>
  </div>
</div>
