<div class="p-6 bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto">

    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Gestión de Accesos</h1>
      <p class="text-gray-500">Asigna qué módulos puede ver cada rol en el sistema.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">

      <div class="p-6 border-b border-gray-100 bg-gray-50/50">
        <label class="block text-sm font-semibold text-gray-600 mb-2">Selecciona un Rol</label>
        <select
          [(ngModel)]="rolSeleccionadoId"
          (change)="onRolChange()"
          class="w-full md:w-1/3 bg-white border border-gray-200 text-gray-700 py-2.5 px-4 rounded-xl focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all cursor-pointer font-medium">
          <option [ngValue]="undefined">Escoger rol...</option>
          <option *ngFor="let rol of roles" [value]="rol.id">{{ rol.nombreRol }}</option>
        </select>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead class="bg-gray-50 text-gray-400 text-xs uppercase tracking-widest font-bold">
            <tr>
              <th class="px-6 py-4">Nombre del Módulo</th>
              <th class="px-6 py-4">Ruta del Sistema</th>
              <th class="px-6 py-4 text-right">Estado de Acceso</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100">
            <tr *ngIf="!rolSeleccionadoId">
              <td colspan="3" class="px-6 py-12 text-center text-gray-400 italic">
                Seleccione un rol arriba para visualizar y editar sus permisos.
              </td>
            </tr>

            <tr *ngFor="let mod of modulos" class="hover:bg-blue-50/30 transition-colors group">
              <td class="px-6 py-4">
                <div class="font-semibold text-gray-700">{{ mod.nombre }}</div>
                <div class="text-xs text-gray-400">{{ mod.descripcion }}</div>
              </td>
              <td class="px-6 py-4 text-sm font-mono text-blue-600">
                <span class="bg-blue-50 px-2 py-0.5 rounded border border-blue-100">{{ mod.ruta }}</span>
              </td>
              <td class="px-6 py-4 text-right">
                <button
                  (click)="togglePermiso(mod.id)"
                  [disabled]="!rolSeleccionadoId"
                  [ngClass]="permisosActivos[mod.id] ? 'bg-emerald-500' : 'bg-gray-200'"
                  class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">

                  <span
                    [ngClass]="permisosActivos[mod.id] ? 'translate-x-5' : 'translate-x-0'"
                    class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out">
                  </span>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="mt-6 flex items-center gap-4 text-xs text-gray-400">
      <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-full bg-emerald-500"></span> Acceso Permitido
      </div>
      <div class="flex items-center gap-1.5">
        <span class="w-3 h-3 rounded-full bg-gray-200"></span> Acceso Denegado
      </div>
    </div>

  </div>
</div>
