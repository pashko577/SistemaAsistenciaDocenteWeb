<div class="min-h-screen bg-gray-50 flex">
  
  <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col">
    <div class="p-6 border-b border-gray-100 flex justify-center">
      <img src="/logo.png" alt="James Baldwin" class="h-12 w-auto">
    </div>

    <nav class="flex-1 p-4">
      <ul class="space-y-2">
        @for (item of menuItems(); track item.id) {
          <li>
            <a [routerLink]="item.ruta" 
               routerLinkActive="bg-blue-50 text-blue-600 border-r-4 border-blue-600"
               class="flex items-center gap-3 px-4 py-3 text-gray-600 rounded-lg hover:bg-gray-50 transition-all group">
              <span class="material-icons text-gray-400 group-hover:text-blue-500">{{ item.icono }}</span>
              <span class="font-medium">{{ item.titulo }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="p-4 border-t border-gray-100 bg-gray-50/50">
      <p class="text-[10px] uppercase tracking-widest text-gray-400 font-bold mb-1">Sesión activa</p>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
        <span class="text-sm font-semibold text-gray-700">{{ auth.getRole() | titlecase }}</span>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col">
    <app-user-header></app-user-header>

    <main class="flex-1 container mx-auto p-4 md:p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
